# Have to be derived from VQ-GAN Latent space dimensions
diffusion_img_size: 32 # 32 v1
diffusion_depth_size: 32
diffusion_num_channels: 4
out_dim: 1
dim_mults: [1,2,4,8]
results_folder: checkpoints/
results_folder_postfix: 'evo_tumor_mask_diffusion_v5' # 1000 timesteps v1 (actually is 32 dim)
load_milestone: False

batch_size: 1 # 40
num_workers: 16
logger: wandb
objective: pred_x0
save_and_sample_every: 1000
denoising_fn: Unet3D
train_lr: 1e-4
timesteps: 500 # number of steps - 500 v1, 200 v2, 1000 v3
sampling_timesteps: 500 # number of sampling timesteps (using ddim for faster inference [see citation for ddim paper])
loss_type: l1 # L1 or L2
train_num_steps: 100000 # total training steps
gradient_accumulate_every: 1 # gradient accumulation steps
ema_decay: 0.995 # exponential moving average decay
amp: True # turn on mixed precision
num_sample_rows: 1
gpus: 0
